<!DOCTYPE html>
<html>
<head>
    <title>Incident Manager</title>
</head>
<body>

<h1>Incident Manager</h1>

<!-- Create Incident -->
<h3>Create Incident</h3>
<input type="text" id="title" placeholder="Title">
<button onclick="createIncident()">Create</button>

<!-- Get All Incidents -->
<h3>All Incidents</h3>
<button onclick="getIncidents()">Load Incidents</button>
<ul id="incidentList"></ul>

<script>

    const BASE_URL = "http://localhost:9090/api/incidents";

    // CREATE INCIDENT
    function createIncident() {
        const title = document.getElementById("title").value;

        fetch(BASE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title
            })
        })
            .then(res => res.json())
            .then(data => {
                alert("Incident Created: " + data.id);
            });
    }

    // GET ALL INCIDENTS
    function getIncidents() {
        fetch(BASE_URL)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("incidentList");
                list.innerHTML = "";

                data.forEach(incident => {
                    const li = document.createElement("li");
                    li.innerText = incident.id + " - " + incident.title;
                    list.appendChild(li);
                });
            });
    }

</script>

</body>
</html>
